<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial, sans-serif;
}

.table {
  display: table;
  border-collapse: collapse;
  width: 100%;
}

.row {
  display: table-row;
}

.cell {
  display: table-cell;
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.chinese {
  cursor: pointer;
  color: darkblue;
  font-weight: bold;
}

.chinese:hover {
  color: red;
}

.speaking {
  color: green !important;
}
</style>
</head>

<body>

<div class="table">

  <div class="row">
    <div class="cell chinese" onclick="speak(this)">你好</div>
    <div class="cell">Nǐ hǎo</div>
    <div class="cell">Hallo</div>
  </div>

  <div class="row">
    <div class="cell chinese" onclick="speak(this)">你好吗？</div>
    <div class="cell">Nǐ hǎo ma?</div>
    <div class="cell">Wie geht es dir?</div>
  </div>

  <div class="row">
    <div class="cell chinese" onclick="speak(this)">谢谢</div>
    <div class="cell">Xièxiè</div>
    <div class="cell">Danke</div>
  </div>

</div>

<script>
function speak(element) {
  const text = element.innerText;

  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'zh-CN';

  speechSynthesis.cancel();

  element.classList.add("speaking");

  msg.onend = function() {
    element.classList.remove("speaking");
  };

  speechSynthesis.speak(msg);
}
</script>

</body>
</html>
