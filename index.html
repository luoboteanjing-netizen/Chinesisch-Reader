<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flashcards – Suchansicht (ZH/DE-seitig)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Flashcards – Suche (seitenbezogen)</h1>
    <div class="controls controls-block">
      <select id="side" title="Welche Seite wird durchsucht & angezeigt">
        <option value="zh">Seite: Chinesisch</option>
        <option value="de">Seite: Deutsch</option>
      </select>
      <input id="q" placeholder="Suche (Töne ignoriert)…" />
      <button class="btn" id="clear">Suche löschen</button>
    </div>
  </header>

  <main class="container">
    <div id="meta" class="muted small"></div>

    <section class="filters">
      <div class="legend">Lektionen (aus ID, erste 3 Zeichen) – Auswahl wirkt auf die Suche</div>
      <div class="lesson-box">
        <label class="chip"><input type="checkbox" id="lesson_all" checked> Alle</label>
        <div id="lessonFilters" class="lesson-list"></div>
      </div>
    </section>

    <div id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">Keine Karten gefunden.</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
