<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinesisch-Reader Flashcards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <!-- PWA: Theme für iOS/Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chinesisch-Reader">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <header>
    <!-- Stimme ändern (GEÄNDERT: Jetzt OBERHALB der Suche) -->
    <div class="controls">
      <label for="voiceSelect" class="control-label">Stimme ändern:</label>
      <select id="voiceSelect">
        <option value="de">Deutsch</option>
        <option value="zh">Chinesisch</option>
        <!-- Weitere Sprachen hinzufügbar -->
      </select>
    </div>

    <!-- Suche (GEÄNDERT: Jetzt UNTER der Stimme; Vermerk entfernt) -->
    <div class="controls">
      <label for="searchInput" class="control-label">Suche:</label>
      <input type="text" id="searchInput" placeholder="Suche in Pinyin oder Deutsch...">
      <!-- GEÄNDERT: Vermerk "(Töne ignoriert)" entfernt -->
    </div>

    <!-- Debug-Infos (GEÄNDERT: Rauskommentiert – unsichtbar) -->
    <!--
    <div id="meta" class="meta">
      CSV geladen • Delimiter: "TAB" • Karten: 0 • 0 ms • PWA: Offline-fähig
    </div>
    -->
  </header>

  <main>
    <section id="filters">
      <!-- Lektion-Filter (unverändert) -->
      <div class="filter-group">
        <label for="lessonSelect">Lektion wählen:</label>
        <select id="lessonSelect">
          <option value="all">Alle Lektionen</option>
        </select>
      </div>
    </section>

    <section id="cards">
      <!-- Flashcards werden hier via JS gerendert -->
      <div class="card" id="card-template" style="display: none;">
        <div class="card-front">
          <h3 class="pinyin"></h3>
          <p class="german"></p>
        </div>
        <div class="card-back">
          <h3 class="chinese"></h3>
          <audio controls class="tts-audio"></audio>
          <button class="tts-btn">TTS</button>
        </div>
      </div>
    </section>

    <!-- Study-Modus (unverändert) -->
    <section id="study-mode" style="display: none;">
      <h2>Study-Modus</h2>
      <button id="study-btn">Study starten</button>
      <div id="study-cards"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
