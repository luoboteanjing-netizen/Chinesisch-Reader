<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flashcards – Chinesisch/Deutsch (CSV direkt)</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Kleine Styles für den neuen Lektionen-Bereich */
    .filters { display:flex; flex-direction:column; gap:8px; }
    .lesson-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .chip { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border:1px solid #2a2f39; border-radius:16px; background:#0e1116; color:#e7e7e7; }
    .chip input { accent-color:#4cc2ff; }
    .legend { font-size:12px; color:#9aa0a6; }
  </style>
</head>
<body>
  <header>
    <h1>Flashcards – Chinesisch/Deutsch</h1>
    <div class="controls">
      <select id="side">
        <option value="zh">Seite: Chinesisch</option>
        <option value="de">Seite: Deutsch</option>
      </select>
      <input id="q" placeholder="Suche in beiden Seiten..." />
      <button class="toggle" id="flipAll" title="Alle Karten umdrehen">Alle umdrehen</button>
    </div>
  </header>

  <main class="container">
    <div id="meta" class="muted small"></div>

    <!-- NEU: Lektions-Filter -->
    <section class="filters">
      <div class="legend">Lektionen auswählen (aus ID, erste 3 Zeichen):</div>
      <div id="lessonFilters" class="lesson-row"><!-- Chips werden per JS eingefügt --></div>
    </section>

    <div id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">Keine Karten gefunden.</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
